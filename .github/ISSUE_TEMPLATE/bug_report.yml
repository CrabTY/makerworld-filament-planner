name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include MakerWorld links if they are safe to share publicly.
      placeholder: |
        1. Open ...
        2. Paste ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, deployment URL, and app version if known.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or exports
      description: Add screenshots, CSV snippets, or copied purchase-list output if useful. Remove private data first.
